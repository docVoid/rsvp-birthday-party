services:
  postgres:
    image: postgres:16-alpine
    container_name: rsvp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rsvp
      POSTGRES_PASSWORD: rsvp_secret
      POSTGRES_DB: rsvp_birthday
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
