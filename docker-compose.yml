services:
  # Deine Datenbank
  postgres:
    image: postgres:16-alpine
    container_name: rsvp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rsvp
      POSTGRES_PASSWORD: rsvp_secret
      POSTGRES_DB: rsvp_birthday
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - rsvp-network

  # Deine Next.js App
  app:
    build: .
    container_name: nextjs-app
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    depends_on:
      - postgres
    networks:
      - rsvp-network

volumes:
  pgdata:

networks:
  rsvp-network:
    driver: bridge
